palettes: 
  - name: global_palette
    images: automatic

converts:
  - name: player_textures
    palette: global_palette
    images:
      - alex/alex_forward1.png
      - alex_forward2.png
      - alex_forward3.png
      - alex_forward4.png
      - alex_right1.png
      - alex_right2.png
      - alex_right3.png
      - alex_right4.png
      - alex_back1.png
      - alex_back2.png
      - alex_back3.png
      - alex_back4.png
      - alex_left1.png
      - alex_left2.png
      - alex_left3.png
      - alex_left4.png
  - name: tileset_textures
    palette: global_palette
    tilesets:
        tile-width: 16
        tile-height: 16
        images:
          - basic_grass_tileset.png

outputs:
  - type: c
    include-file: gfx.h
    palettes:
      - global_palette
    converts:
      - player_textures
      - tileset_textures
