palettes: 
  - name: global_palette
    images: automatic

converts:
  - name: player_textures
    palette: global_palette
    images:
      - alex_forward_still.png
  - name: tileset_textures
    palette: global_palette
    tilesets:
        tile-width: 16
        tile-height: 16
        images:
          - basic_grass_tileset.png

outputs:
  - type: c
    include-file: gfx.h
    palettes:
      - global_palette
    converts:
      - player_textures
      - tileset_textures
